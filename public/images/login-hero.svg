<svg width="640" height="520" viewBox="0 0 640 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="heroGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="640" height="520" rx="32" fill="url(#heroGradient)"/>
  <g transform="translate(60 80)">
    <rect width="220" height="130" rx="18" fill="url(#cardGradient)" stroke="rgba(255,255,255,0.15)" />
    <text x="24" y="42" font-size="32" font-family="Inter, Arial, sans-serif" fill="#ffffff" font-weight="600">58,240</text>
    <text x="24" y="70" font-size="14" font-family="Inter, Arial, sans-serif" fill="rgba(255,255,255,0.8)">Creators monitored</text>
    <line x1="24" y1="85" x2="196" y2="85" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <text x="24" y="110" font-size="13" fill="rgba(255,255,255,0.7)">+1,204 this week</text>
  </g>
  <g transform="translate(300 60)" filter="url(#shadow)">
    <rect width="280" height="200" rx="22" fill="rgba(15,23,42,0.45)" stroke="rgba(255,255,255,0.08)"/>
    <text x="28" y="48" font-size="18" font-family="Inter, Arial, sans-serif" fill="#ffffff" font-weight="600">Campaign Health</text>
    <polyline points="40,150 90,110 140,130 190,80 240,95" fill="none" stroke="#38bdf8" stroke-width="4" stroke-linecap="round" />
    <circle cx="90" cy="110" r="6" fill="#38bdf8"/>
    <circle cx="190" cy="80" r="6" fill="#38bdf8"/>
    <text x="40" y="180" font-size="12" fill="rgba(255,255,255,0.7)">Last 30 days</text>
  </g>
  <g transform="translate(80 260)">
    <rect width="240" height="180" rx="20" fill="rgba(15,23,42,0.35)" stroke="rgba(255,255,255,0.08)"/>
    <text x="24" y="48" font-size="18" font-family="Inter, Arial, sans-serif" fill="#ffffff" font-weight="600">Pipeline</text>
    <rect x="36" y="80" width="40" height="72" rx="10" fill="#22d3ee"/>
    <rect x="96" y="64" width="40" height="88" rx="10" fill="#38bdf8"/>
    <rect x="156" y="40" width="40" height="112" rx="10" fill="#818cf8"/>
    <text x="36" y="174" font-size="12" fill="rgba(255,255,255,0.7)">Qualified</text>
    <text x="96" y="174" font-size="12" fill="rgba(255,255,255,0.7)">In-prog</text>
    <text x="156" y="174" font-size="12" fill="rgba(255,255,255,0.7)">Closed</text>
  </g>
</svg>

